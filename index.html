<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>課題の解説と外部ライブラリ</title>
</head>
<body>
    <header>
        <h1>課題の解説と外部ライブラリ</h1>
    </header>
    <div>
        <h2>課題の解説（じゃんけん）</h2>

        <!--0:グー,1:チョキ,2:パー-->
        <button type="button" onclick="janken(0)">グー</button>
        <button type="button" onclick="janken(1)">チョキ</button>
        <button type="button" onclick="janken(2)">パー</button>

        <div>
            <!--じゃんけんの結果を表示する領域-->
            <p id="janken-result"></p>
        </div>

    </div>

    <div>
        <h2>jQuery</h2>
        <p id="test-p-1">hoge</p>
        <p id="test-p-2">hogehoge</p>
        <p id="test-p-3">hogehogehoge</p>

        <button type="button" onclick="test()">jQueryを使ってみる</button>
    </div>

    <!--外部のJavascriptライブラリを読み込む-->
    <!--読み込む順番が重要-->
    <!--jQuery-->
    <script src="https://code.jquery.com/jquery-3.6.0.js" integrity="sha256-H+K7U5CnXl1h5ywQfKtSj8PCmoN9aaq30gDh27Xc0jk=" crossorigin="anonymous"></script>

    <!--外部のJavascriptを読み込む-->
    <script src="./js/janken.js"></script>

    <!--jQueryを使ってみる-->
    <script src="./js/jQuery-test.js"></script>
</body>
</html>
